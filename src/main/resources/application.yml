server:
  port: 8080

spring:
  application:
    name: ai-ordering-agent
  
  r2dbc:
    url: r2dbc:h2:mem:///orderdb
    initialization-mode: never
  
  sql:
    init:
      mode: never
  
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.ximalaya.ai.ordering: DEBUG
    org.springframework.r2dbc: DEBUG

ai:
  deepseek:
    api-key: ${AI_DEEPSEEK_API_KEY:sk-9dd346e5f5a6498998cb932a146959f1}
    base-url: ${AI_DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
    model: ${AI_DEEPSEEK_MODEL:deepseek-chat}
  embedding:
    api-key: ${AI_EMBEDDING_API_KEY:${AI_DEEPSEEK_API_KEY:}}
    base-url: ${AI_EMBEDDING_BASE_URL:${AI_DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}}
    model: ${AI_EMBEDDING_MODEL:text-embedding-ada-002}
    dimensions: ${AI_EMBEDDING_DIMENSIONS:256}
    fallback-local: ${AI_EMBEDDING_FALLBACK_LOCAL:true}

rag:
  enabled: ${RAG_ENABLED:true}
  top-k: ${RAG_TOP_K:5}
  min-score: ${RAG_MIN_SCORE:0.35}
  inject-to-agent-prompt: ${RAG_INJECT_TO_AGENT:true}

feishu:
  enabled: ${FEISHU_ENABLED:false}
  app-id: ${FEISHU_APP_ID:cli_aa9944c201fa1cb5}
  app-secret: ${FEISHU_APP_SECRET:TTbOdh9ZOcb8NKOM7JD9EfkJ4zlzChLB}
  verification-token: ${FEISHU_VERIFICATION_TOKEN:}
  encrypt-key: ${FEISHU_ENCRYPT_KEY:}
  base-url: ${FEISHU_BASE_URL:https://open.feishu.cn}

agent:
  ordering:
    # false（默认）调用 DeepSeek；true 使用本地关键词模拟
    simulation-mode: ${AGENT_SIMULATION_MODE:false}
    prompt:
      system: |
        你是一个智能点餐助手，帮助用户进行点餐。
        请根据用户的自然语言输入，解析出菜品名称和数量。
        如果有不清楚的地方，可以询问用户。
      few-shot: |
        示例1: "我要一份宫保鸡丁和两份鱼香肉丝"
        输出: {"items":[{"name":"宫保鸡丁","quantity":1},{"name":"鱼香肉丝","quantity":2}]}
        
        示例2: "来个招牌菜"
        输出: {"items":[],"suggestion":"请问您想选择哪个招牌菜呢？"}
    memory:
      max-history-messages: 10